services:

  # ── Backend (Node.js + Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codepilot_backend
    restart: always
    env_file:
      - ./backend/.env.docker
    environment:
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded files across container restarts
      - backend_uploads:/app/public/uploads
    networks:
      - codepilot_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./codepilot-ai
      dockerfile: Dockerfile
      args:
        # Points to backend service name — resolved inside Docker network
        - NEXT_PUBLIC_API_URL=http://backend:5000
    container_name: codepilot_frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - codepilot_network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  backend_uploads:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  codepilot_network:
    driver: bridge
